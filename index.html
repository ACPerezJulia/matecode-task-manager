<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MateCode</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
    />
    <!-- Aplica el tema ANTES del primer pintado (evita flash).
         Migra nombres viejos: light→classic, dark→midnight, vibrant→gradient. -->
    <script>
      (function () {
        var map = { light: 'classic', dark: 'midnight', vibrant: 'gradient' }
        var t = localStorage.getItem('matecode-theme')
        if (t && map[t]) { t = map[t]; localStorage.setItem('matecode-theme', t) }
        if (t === 'classic' || t === 'midnight' || t === 'gradient') {
          document.documentElement.setAttribute('data-theme', t)
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
